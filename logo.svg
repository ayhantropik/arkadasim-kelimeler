<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="tileGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="tileGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="tileGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="tileGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="tileShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="20" y="20" width="360" height="360" rx="70" ry="70" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Inner glow -->
  <rect x="20" y="20" width="360" height="360" rx="70" ry="70" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>

  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="30" fill="rgba(255,255,255,0.08)"/>
  <circle cx="340" cy="120" r="20" fill="rgba(255,255,255,0.06)"/>
  <circle cx="100" cy="330" r="15" fill="rgba(255,255,255,0.07)"/>

  <!-- Letter tile A -->
  <g filter="url(#tileShadow)">
    <rect x="55" y="100" width="90" height="90" rx="18" ry="18" fill="url(#tileGrad1)"/>
    <text x="100" y="162" font-family="'Nunito','Arial',sans-serif" font-size="52" font-weight="900" fill="#fff" text-anchor="middle">A</text>
  </g>

  <!-- Letter tile R -->
  <g filter="url(#tileShadow)">
    <rect x="155" y="100" width="90" height="90" rx="18" ry="18" fill="url(#tileGrad2)"/>
    <text x="200" y="162" font-family="'Nunito','Arial',sans-serif" font-size="52" font-weight="900" fill="#fff" text-anchor="middle">R</text>
  </g>

  <!-- Letter tile K -->
  <g filter="url(#tileShadow)">
    <rect x="255" y="100" width="90" height="90" rx="18" ry="18" fill="url(#tileGrad3)"/>
    <text x="300" y="162" font-family="'Nunito','Arial',sans-serif" font-size="52" font-weight="900" fill="#fff" text-anchor="middle">K</text>
  </g>

  <!-- Letter tile E -->
  <g filter="url(#tileShadow)">
    <rect x="80" y="205" width="80" height="80" rx="16" ry="16" fill="url(#tileGrad4)"/>
    <text x="120" y="261" font-family="'Nunito','Arial',sans-serif" font-size="46" font-weight="900" fill="#fff" text-anchor="middle">E</text>
  </g>

  <!-- Letter tile L -->
  <g filter="url(#tileShadow)">
    <rect x="170" y="205" width="80" height="80" rx="16" ry="16" fill="url(#tileGrad1)"/>
    <text x="210" y="261" font-family="'Nunito','Arial',sans-serif" font-size="46" font-weight="900" fill="#fff" text-anchor="middle">L</text>
  </g>

  <!-- Letter tile İ -->
  <g filter="url(#tileShadow)">
    <rect x="260" y="205" width="80" height="80" rx="16" ry="16" fill="url(#tileGrad2)"/>
    <text x="300" y="261" font-family="'Nunito','Arial',sans-serif" font-size="46" font-weight="900" fill="#fff" text-anchor="middle">İ</text>
  </g>

  <!-- Star decorations -->
  <polygon points="60,60 63,52 70,52 65,47 67,40 60,44 53,40 55,47 50,52 57,52" fill="url(#starGrad)"/>
  <polygon points="330,70 332,65 337,65 334,61 335,56 330,59 325,56 326,61 323,65 328,65" fill="url(#starGrad)" transform="scale(1.3) translate(-75,-12)"/>
  <polygon points="340,300 342,295 347,295 344,291 345,286 340,289 335,286 336,291 333,295 338,295" fill="url(#starGrad)"/>

  <!-- Sparkle dots -->
  <circle cx="48" cy="180" r="4" fill="#fbbf24" opacity="0.8"/>
  <circle cx="355" cy="250" r="3" fill="#fbbf24" opacity="0.7"/>
  <circle cx="200" cy="55" r="3.5" fill="#fff" opacity="0.6"/>

  <!-- Bottom text area -->
  <text x="200" y="335" font-family="'Arial',sans-serif" font-size="22" font-weight="900" fill="rgba(255,255,255,0.95)" text-anchor="middle" letter-spacing="2">ARKADAŞIM</text>
  <text x="200" y="365" font-family="'Arial',sans-serif" font-size="22" font-weight="900" fill="rgba(255,255,255,0.95)" text-anchor="middle" letter-spacing="2">KELİMELER</text>
</svg>
